# CpHMD Configuration — Single Residue (ASP) in Water
#
# Full workflow including build step.
# No pre-built PDB — the build step creates ALA-ALA-ASP-ALA-ALA pentapeptide.
# Setup steps: build → solvate → patch. Launch ALF with cphmd init/run.

build:
  residue: ASP
  output_dir: pdb
  template: "ALA ALA {res} ALA ALA"

solvation:
  input_file: pdb/asp
  output_dir: .
  crystal_type: OCTAHEDRAL
  padding: 10.0
  salt_concentration: 0.15

patch:
  input_folder: .
  output_folder: prep
  hmr: true
  selected_residues:
    - "PROA:3"

alf:
  input_folder: .
  start: 1
  end: 200
  auto_phase_switch: true
  auto_stop: true
  restrain_hydrogens: true
  g_imp_bins: [20, 32, 32]
