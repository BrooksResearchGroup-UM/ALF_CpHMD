master_seed: 20260418
# Glutamic Acid ALF with LMALF Analysis Method
# Same system as 00_glu_water but uses L-BFGS optimization instead of WHAM

solvation:
  input_file: ../00_glu_water/pdb/glu
  output_dir: .
  crystal_type: OCTAHEDRAL
  padding: 10.0
  salt_concentration: 0.15

patch:
  input_folder: .
  output_folder: prep
  structure_file: solvated
  hmr: true
  selected_residues: [GLU]

alf:
  input_folder: .
  temperature: 298.15
  hmr: true
  auto_phase_switch: true
  auto_stop: true
  cleanup: false
  analysis_method: lmalf
  restrain_hydrogens: true
  g_imp_bins: [20, 32, 32]
