master_seed: 20260418
# Lysozyme (2LZT) CpHMD Example
# Hen egg-white lysozyme with all titratable residues
# Workflow: prepare -> solvate -> patch -> alf

prepare:
  input_source: 2lzt
  source_type: rcsb
  output_dir: pdb
  output_name: molecule
  include_solvent: false
  include_hydrogens: false
  use_bio_assembly: true
  drop_ligands: true

solvation:
  crystal_type: OCTAHEDRAL
  padding: 10.0
  salt_concentration: 0.15
  temperature: 298.15
  minimize: false

patch:
  input_folder: solvated
  output_folder: solvated/prep
  selected_residues: []  # Empty = patch all titratable residues found

alf:
  input_folder: solvated
  pH: true
  temperature: 298.15
  end: 200
  auto_phase_switch: true
  auto_stop: true
  coupling: 1
  hh_plots: true
  use_presets: true
