# CpHMD Configuration — Cysteine (CYS) in Water
#
# Full workflow including build step.
# No pre-built PDB — the build step creates ALA-ALA-CYS-ALA-ALA pentapeptide.
# Steps: build → solvate → patch → alf

build:
  residue: CYS
  output_dir: pdb
  template: "ALA ALA {res} ALA ALA"

solvation:
  input_file: pdb/cys
  output_dir: .
  crystal_type: OCTAHEDRAL
  padding: 10.0
  salt_concentration: 0.15

patch:
  input_folder: .
  output_folder: prep
  hmr: true
  selected_residues:
    - "PROA:3"

alf:
  input_folder: .
  start: 1
  end: 200
  auto_phase_switch: true
  auto_stop: true
  restrain_hydrogens: true
  g_imp_bins: [20, 32, 32]
