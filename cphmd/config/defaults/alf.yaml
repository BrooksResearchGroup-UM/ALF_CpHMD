temperature: 298.15
phase: 1
start: 1
end: 200
restrains: SCAT
restrain_hydrogens: false
auto_phase_switch: true
auto_stop: true
# Phase transition thresholds (uncomment to override defaults)
# phase_transition:
#   ewbs_2to3: 0.10        # Global EWBS threshold for Phase 2→3
#   ewbs_2to3_b: 0.20      # Per-type: diagonal bias
#   ewbs_2to3_c: 2.00      # Per-type: coupling bias (converges slower)
#   ewbs_2to3_x: 1.00      # Per-type: cross-term x
#   ewbs_2to3_s: 0.50      # Per-type: shift-term s
#   spread_2to3: 0.20      # Max spread tolerance
#   min_phase2_runs: 15    # Min Phase 2 iterations before allowing 2→3
analysis_method: wham
elec_type: pmeex
vdw_type: vswitch
fnex: 5.5
use_gshift: true          # Apply G_imp entropy shifts in WHAM Stage 2
# chi_offset: null    # s-term sigmoid offset (null = 4*exp(-fnex))
# omega_decay: null    # x-term exponential decay (null = fnex)
# bias_type: bcxs     # Bias type shorthand (bc, bcx, bcxs, bcxst, bcxstu)
no_t_bias: true       # Disable t-term bias updates (bcxstu)
no_u_bias: true       # Disable u-term bias updates (bcxstu)
chi_offset_t: 0.012   # t-term sigmoid offset (independent of FNEX)
chi_offset_u: 0.012   # u-term offset (independent of FNEX)
# endpoint_weight: 100.0  # WHAM endpoint bin weight (float or [phase1, phase2, phase3])
# endpoint_decay: 2.0     # Endpoint ramp decay rate (float or [phase1, phase2, phase3])
hmr: true
cleanup: false
coupling: 0
# bias_guess: false  # Native pyCHARMM ALF initializes from prep/block.str
generate_population_plots: true
generate_dashboard_plots: true
generate_hh_plots: true
# G profile plots are useful diagnostics but expensive/noisy as defaults.
generate_g_profiles_2d: false
generate_g_profiles_3d: false

# MD block length for one continuous DynamicsScript.run() call.
# The native runtime also accepts md_block_steps and the legacy nsteps_per_segment key.
md_block_steps: 1000
lambda_save_steps: 1

# ALF iteration length per phase. One ALF iteration is:
# biased MD sampling -> lambda statistics -> WHAM -> clipped bias update.
# These defaults use the full MD data from each ALF iteration:
# Phase 1 = 40,000 steps, Phase 2 = 250,000 steps, Phase 3 = 2,500,000 steps.
# Use phase*_iteration_steps for exact step counts, phase*_iteration_ps for
# time-based runs, or phase*_repeats only for backward-compatible block counts.
# Native defaults when omitted:
# phase1_iteration_steps: 40000
# phase2_iteration_steps: 250000
# phase3_iteration_steps: 2500000

# Fixed phase schedule for native ALF, counted in completed ALF iterations.
# auto_phase_switch must be false when these are set.
# phase1_iterations: 120
# phase2_iterations: 120

# Number of previous analysis windows for WHAM (int or phase1,phase2,phase3)
# Default: Phase 1=8, Phase 2=4, Phase 3=3
# analysis_window: 5        # same for all phases
# analysis_window: 8,4,3    # per-phase
# analysis_skip: 1           # subsample every Nth lambda frame (reduces WHAM memory)
# analysis_skip: 1,1,10     # per-phase: all frames in Phase 1-2, every 10th in Phase 3

# Manual cutoff overrides per phase (omit to use adaptive defaults)
# phase1_cutoffs:
#   cutb: 5.0
#   cutc: 20.0
#   cutx: 0.0
#   cuts: 0.0
# phase2_cutoffs:
#   cutb: 0.5
#   cutc: 2.0
# phase3_cutoffs:
#   cutb: 0.05
#   cutc: 0.5
# min_xs_coverage_runs: 3  # Consecutive covered runs before Phase 1 x/s enable
# phase1_xs_cutoff: 2.0    # cutx/cuts when x/s enabled in Phase 1

# Replica exchange (pH-ladder swaps between MD blocks)
replica_exchange:
  enabled: false
  # Use either exchange_interval_ps or exchange_interval_steps, not both.
  exchange_interval_ps: 4.0
